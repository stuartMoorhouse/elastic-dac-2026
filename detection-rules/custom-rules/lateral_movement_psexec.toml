[metadata]
creation_date = "2026/05/04"
maturity = "development"
updated_date = "2026/05/04"

[rule]
author = ["Elastic"]
description = """
Detects execution of PsExec or the PsExec service binary, which is commonly used by attackers to
execute commands on remote systems. While legitimate, its use is frequently associated with lateral
movement during intrusions.
"""
enabled = false
false_positives = ["Legitimate administrative use of PsExec by IT operations teams"]
from = "now-9m"
index = ["logs-endpoint.events.*", "winlogbeat-*"]
language = "kuery"
license = "Elastic License v2"
name = "Potential Lateral Movement via PsExec"
risk_score = 73
rule_id = "b2c3d4e5-2222-3333-4444-bbccddee0011"
severity = "high"
tags = ["Domain: Endpoint", "OS: Windows", "Use Case: Threat Detection", "Tactic: Lateral Movement"]
timestamp_override = "event.ingested"
type = "query"
version = 1

query = '''
event.category : "process" and process.name : ("psexec.exe" or "psexesvc.exe")
'''

[[rule.threat]]
framework = "MITRE ATT&CK"

[rule.threat.tactic]
id = "TA0008"
name = "Lateral Movement"
reference = "https://attack.mitre.org/tactics/TA0008/"

[[rule.threat.technique]]
id = "T1021"
name = "Remote Services"
reference = "https://attack.mitre.org/techniques/T1021/"

[[rule.threat.technique.subtechnique]]
id = "T1021.002"
name = "SMB/Windows Admin Shares"
reference = "https://attack.mitre.org/techniques/T1021/002/"
