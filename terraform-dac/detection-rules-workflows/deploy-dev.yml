name: Deploy to Dev
on:
  push:
    branches: [dev]
jobs:
  validate-rules:
    name: Validate Detection Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip}
      - run: pip install elastic-detection-rules
      - name: Validate TOML rules
        run: |
          PASS=0; FAIL=0
          for f in custom-rules/rules/*.toml; do
            [ -f "$f" ] || continue
            if python -m detection_rules validate-rule "$f"; then
              echo "PASS: $f"; PASS=$((PASS+1))
            else
              echo "FAIL: $f"; FAIL=$((FAIL+1))
            fi
          done
          echo "$PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ]
  deploy:
    name: Upload rules to Dev
    runs-on: ubuntu-latest
    needs: validate-rules
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip}
      - run: pip install elastic-detection-rules
      - name: Upload rules to Dev Kibana
        run: |
          for f in custom-rules/rules/*.toml; do
            [ -f "$f" ] || continue
            python -m detection_rules kibana upload-rule "$f" \
              --kibana-url "${{ secrets.DEV_KIBANA_URL }}" \
              -u "${{ secrets.DEV_KIBANA_USERNAME }}" \
              -p "${{ secrets.DEV_KIBANA_PASSWORD }}"
          done
