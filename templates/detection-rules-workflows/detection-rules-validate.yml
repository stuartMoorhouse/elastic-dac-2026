name: CI
on:
  push:
    branches: ['feature/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  validate-rules:
    name: Validate Detection Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install detection-rules CLI
        run: |
          pip install -e ".[dev]"
          pip install lib/kql lib/kibana
      - name: Validate TOML rules
        run: |
          PASS=0; FAIL=0
          for f in custom-rules/rules/*.toml; do
            [ -f "$f" ] || continue
            if python -m detection_rules validate-rule "$f"; then
              echo "PASS: $f"; PASS=$((PASS+1))
            else
              echo "FAIL: $f"; FAIL=$((FAIL+1))
            fi
          done
          echo "$PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ]
  open-pr:
    name: Open Pull Request
    runs-on: ubuntu-latest
    needs: [secrets-scan, validate-rules]
    if: github.event_name == 'push'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Create PR to main if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — skipping."
          else
            TITLE=$(printf '%s' "${{ github.event.head_commit.message }}" | head -1)
            gh pr create \
              --base main \
              --head "${{ github.ref_name }}" \
              --title "$TITLE" \
              --body "Rules validated by CI. Ready for detection-team-lead review."
          fi
