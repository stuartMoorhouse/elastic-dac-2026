name: CI
on:
  push:
    branches: ['feature/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  validate-rules:
    name: Validate Detection Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install detection-rules CLI
        run: |
          pip install -e ".[dev]"
          pip install lib/kql lib/kibana
      - name: Validate TOML rules
        run: |
          PASS=0; FAIL=0
          for f in custom-rules/rules/*.toml; do
            [ -f "$f" ] || continue
            if python -m detection_rules validate-rule "$f"; then
              echo "PASS: $f"; PASS=$((PASS+1))
            else
              echo "FAIL: $f"; FAIL=$((FAIL+1))
            fi
          done
          echo "$PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ]
