name: Validate

on:
  push:
    branches:
      - 'feature/**'
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - dev
      - main

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-rules:
    name: Validate Detection Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install detection-rules CLI
        run: pip install elastic-detection-rules

      - name: Validate TOML rules
        run: |
          PASS=0
          FAIL=0
          for f in detection-rules/custom-rules/*.toml; do
            [ -f "$f" ] || continue
            if python -m detection_rules validate-rule "$f"; then
              echo "PASS: $f"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $f"
              FAIL=$((FAIL + 1))
            fi
          done
          echo "Results: $PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ]

  terraform-checks:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.5'

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN }}

      - name: Terraform Validate
        run: terraform -chdir=terraform validate
